<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dog Martínez</title>

<link rel="stylesheet" href="estilos.css">

<!-- ✅ LEAFLET CSS CORRECTO -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<header>
<h1>🐶 Dog Martínez</h1>
<p>Ayuda a encontrar perros perdidos y rescatar animales</p>
</header>

<main>

<div class="panel">

<h2>Reportar perro</h2>

<form id="formPerro">

<select id="tipo">
<option>Perro perdido</option>
<option>Perro encontrado</option>
<option>Perro en situación de calle</option>
</select>

<input type="text" id="nombre" placeholder="Nombre" required>
<input type="text" id="ubicacion" placeholder="Colonia" required>

<textarea id="descripcion" placeholder="Descripción"></textarea>

<input type="text" id="contacto" placeholder="Teléfono">

<input type="file" id="foto" accept="image/*" required>

<button type="submit">Publicar</button>

</form>

</div>

<div class="contenido">

<div id="mapa"></div>

<input id="buscador" placeholder="🔍 Buscar por colonia o nombre">

<h2>🐾 Reportes</h2>

<div id="lista" class="lista"></div>

</div>

</main>

<!-- ✅ LEAFLET JS CORRECTO -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="script.js"></script>

</body>
</html>
